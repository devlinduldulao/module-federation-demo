# Full-repo CI: runs lint, typecheck, test, and build across ALL packages.
# This catches cross-cutting changes (shared configs, root deps, vitest setup).
#
# Each micro-frontend also has its own independent CI workflow (ci-<name>.yml)
# that triggers only when that module's code changes. In a real multi-repo
# setup, the per-module workflows are all you need. This full-repo workflow
# is a safety net for the monorepo.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: pnpm exec eslint .

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - name: Typecheck all packages
        run: |
          for pkg in shell records prescriptions analytics home; do
            echo "::group::Typechecking $pkg"
            (cd packages/$pkg && pnpm exec tsc --noEmit)
            echo "::endgroup::"
          done

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: pnpm run build
