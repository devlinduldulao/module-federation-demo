# Independent CI pipeline for the Home micro-frontend.
# Triggers ONLY when home code changes — other modules don't run this.
# In a real multi-repo setup, this would be the repo's only CI workflow.

name: "CI: Home"

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/home/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "eslint.config.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "packages/home/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "eslint.config.mjs"
      - "package.json"

concurrency:
  group: ci-home-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: npx eslint packages/home/src

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: cd packages/home && npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: npx vitest run packages/home/src

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: cd packages/home && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: home-dist
          path: packages/home/dist/
          retention-days: 7
