# Deploys the micro-frontend app to GitHub Pages.
#
# SETUP (one-time, only if Pages has never been enabled here):
#   Option A: Go to repo Settings → Pages and set "Source" to "GitHub Actions"
#   Option B: Add a PAGES_ADMIN_TOKEN secret so this workflow can create the site
#   After that, pushes to main handle the rest
#
# HOW IT WORKS:
#   - Remotes (home, records, prescriptions, analytics) are built first
#   - Shell is built with REMOTE_BASE_URL pointing to the Pages URL
#   - All outputs are assembled into a single directory:
#       /                → shell (host app)
#       /remotes/home/   → home remote (remoteEntry.js + chunks)
#       /remotes/records/        → records remote
#       /remotes/prescriptions/  → prescriptions remote
#       /remotes/analytics/      → analytics remote
#   - 404.html is a copy of index.html (SPA fallback for client-side routing)

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --force

      - name: Ensure GitHub Pages site exists
        id: pages
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PAGES_ADMIN_TOKEN != '' && secrets.PAGES_ADMIN_TOKEN || github.token }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const isUserOrOrgSite = repo.toLowerCase() === `${owner.toLowerCase()}.github.io`;
            const fallbackPageUrl = isUserOrOrgSite
              ? `https://${owner}.github.io`
              : `https://${owner}.github.io/${repo}`;

            async function getPagesSite() {
              try {
                const response = await github.request("GET /repos/{owner}/{repo}/pages", {
                  owner,
                  repo,
                });
                return response.data;
              } catch (error) {
                if (error.status === 404) {
                  return null;
                }
                throw error;
              }
            }

            let site = await getPagesSite();

            if (!site) {
              if (process.env.HAS_PAGES_ADMIN_TOKEN !== "true") {
                core.setFailed(
                  "GitHub Pages is not enabled for this repository and the workflow token cannot create it. Enable Pages once in repository settings with Source set to GitHub Actions, or add a PAGES_ADMIN_TOKEN secret with Pages:write and Administration:write permissions."
                );
                return;
              }

              core.info("No Pages site found. Creating one with build_type=workflow.");

              try {
                await github.request("POST /repos/{owner}/{repo}/pages", {
                  owner,
                  repo,
                  build_type: "workflow",
                });
              } catch (error) {
                if (error.status !== 409) {
                  throw error;
                }
              }

              site = await getPagesSite();
            }

            if (!site) {
              core.setFailed(
                "Unable to confirm a GitHub Pages site after bootstrap. Check repository Pages availability and token permissions."
              );
              return;
            }

            const pageUrl = site.html_url || fallbackPageUrl;
            const normalizedPageUrl = pageUrl.replace(/\/$/, "");
            const { pathname, origin } = new URL(`${normalizedPageUrl}/`);
            const normalizedPath = pathname === "/" ? "" : pathname.replace(/\/$/, "");

            core.setOutput("page_url", normalizedPageUrl);
            core.setOutput("base_url", `${origin}${normalizedPath}`);
            core.setOutput("base_path", normalizedPath);
        env:
          HAS_PAGES_ADMIN_TOKEN: ${{ secrets.PAGES_ADMIN_TOKEN != '' }}

      # Build all four remotes (no special env vars — publicPath: "auto" works)
      - name: Build remotes
        run: |
          for remote in home records prescriptions analytics; do
            echo "::group::Building $remote"
            (cd packages/$remote && npm run build)
            echo "::endgroup::"
          done

      # Build the shell host with production remote URLs and base path
      - name: Build shell
        run: cd packages/shell && npm run build
        env:
          REMOTE_BASE_URL: ${{ steps.pages.outputs.base_url }}
          BASE_PATH: ${{ steps.pages.outputs.base_path }}

      # Assemble all build outputs into a single deployable directory
      - name: Assemble site
        run: |
          mkdir -p _site/remotes

          # Shell → site root
          cp -r packages/shell/dist/* _site/

          # Remotes → /remotes/<name>/
          for remote in home records prescriptions analytics; do
            cp -r packages/$remote/dist _site/remotes/$remote
          done

          # SPA fallback: GitHub Pages serves 404.html for unknown paths.
          # Since the shell's index.html uses absolute publicPath, scripts
          # resolve correctly regardless of the URL path.
          cp _site/index.html _site/404.html

          # Prevent Jekyll from ignoring files starting with _
          touch _site/.nojekyll

          echo "Site assembled:"
          find _site -maxdepth 3 -type f | head -40

      - uses: actions/upload-pages-artifact@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
