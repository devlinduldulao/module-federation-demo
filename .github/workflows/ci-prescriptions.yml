# Independent CI pipeline for the Prescriptions micro-frontend.
# Triggers ONLY when prescriptions code changes — other modules don't run this.
# In a real multi-repo setup, this would be the repo's only CI workflow.

name: "CI: Prescriptions"

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/prescriptions/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "eslint.config.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "packages/prescriptions/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "eslint.config.mjs"
      - "package.json"

concurrency:
  group: ci-prescriptions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: pnpm exec eslint packages/prescriptions/src

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: cd packages/prescriptions && pnpm exec tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: pnpm exec vitest run packages/prescriptions/src

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
          run_install: false
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            packages/*/pnpm-lock.yaml
      - run: pnpm install --force
      - run: cd packages/prescriptions && pnpm run build
      - uses: actions/upload-artifact@v7
        with:
          name: prescriptions-dist
          path: packages/prescriptions/dist/
          retention-days: 7
