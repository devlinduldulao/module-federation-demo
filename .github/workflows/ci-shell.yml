# Independent CI pipeline for the Shell (host) micro-frontend.
# Triggers ONLY when shell code changes — other modules don't run this.
#
# The shell is special: it doesn't expose components, it CONSUMES them.
# It needs REMOTE_BASE_URL and BASE_PATH for production builds, but CI
# only validates that it compiles — the actual prod deploy with correct
# URLs is handled by deploy.yml.

name: "CI: Shell"

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/shell/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "eslint.config.mjs"
      - "package.json"
  push:
    branches: [main]
    paths:
      - "packages/shell/**"
      - "vitest.config.ts"
      - "vitest.setup.ts"
      - "eslint.config.mjs"
      - "package.json"

concurrency:
  group: ci-shell-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: npx eslint packages/shell/src

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: cd packages/shell && npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      - run: npx vitest run packages/shell/src

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - run: npm install --force
      # CI build uses default localhost URLs — validates compilation only.
      # Production build with real REMOTE_BASE_URL is done in deploy.yml.
      - run: cd packages/shell && npm run build
      - uses: actions/upload-artifact@v7
        with:
          name: shell-dist
          path: packages/shell/dist/
          retention-days: 7
